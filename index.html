<script>

const usuarios = {
borborema:"borborema1",
itapolis:"itapolis1",
taquaritinga:"taquaritinga1",
santaernestina:"santaernestina1",
dobrada:"dobrada1",
admin:"admin"
};

const hoje = new Date().toISOString().split("T")[0];
let pedido = [];

function getTotalHoje(){
return JSON.parse(localStorage.getItem("pedido_" + hoje)) || {};
}

function salvarTotal(data,obj){
localStorage.setItem("pedido_" + data, JSON.stringify(obj));
}

const produtos = [
// (mantém sua lista exatamente como está)
];

window.onload = function(){
const select = document.getElementById("produto");
produtos.forEach(p=>{
let opt=document.createElement("option");
opt.text=p;
opt.value=p;
if(p.includes("---")) opt.disabled=true;
select.add(opt);
});
}

function login(){
let u = document.getElementById("user").value.toLowerCase();
let p = document.getElementById("pass").value;

if(usuarios[u] && usuarios[u]===p){
document.getElementById("loginCard").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("storeTitle").innerText="Loja: "+u+" | Data: "+hoje;

if(u==="admin"){
document.getElementById("adminArea").classList.remove("hidden");
carregarDatas();
}
}else{
alert("Login inválido");
}
}

function addItem(){
let prod=document.getElementById("produto").value;
let qtd=parseFloat(document.getElementById("qtd").value);
if(!qtd || prod.includes("---")) return;

pedido.push({prod,qtd});
let li=document.createElement("li");
li.innerText=prod+" - "+qtd;
document.getElementById("lista").appendChild(li);
document.getElementById("qtd").value="";
}

function enviar(){
let total = getTotalHoje();

pedido.forEach(item=>{
total[item.prod]=(total[item.prod]||0)+item.qtd;
});

salvarTotal(hoje,total);

alert("Pedido enviado!");
pedido=[];
document.getElementById("lista").innerHTML="";
}

function carregarDatas(){
let select=document.getElementById("dataSelect");
select.innerHTML="";

for(let i=0;i<localStorage.length;i++){
let key=localStorage.key(i);
if(key.startsWith("pedido_")){
let data=key.replace("pedido_","");
let opt=document.createElement("option");
opt.value=data;
opt.text=data;
select.appendChild(opt);
}
}

if(select.value) mostrarData(select.value);
}

function mostrarData(data){
let total=JSON.parse(localStorage.getItem("pedido_"+data))||{};
let ul=document.getElementById("totalDia");
ul.innerHTML="";

for(let p in total){
let li=document.createElement("li");
li.innerText=p+" - "+total[p];
ul.appendChild(li);
}
}

function limparDia(){
if(confirm("Fechar dia atual?")){
localStorage.removeItem("pedido_"+hoje);
location.reload();
}
}

</script>
