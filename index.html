
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varejão Pag Leve</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                url('logo.png') no-repeat center center;
    background-size: cover;
    background-attachment: scroll;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    color: white;
    backdrop-filter: blur(10px);
}

.login-box h2 {
    margin-bottom: 30px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #4CAF50, #8BC34A);
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Sistema de Pedidos</h2>
    <input type="text" placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <button>Entrar</button>
</div>

</body>
</html>
