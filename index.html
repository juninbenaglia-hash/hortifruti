<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varejão Pag Leve</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('logo.png') no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

/* Desce o login */
.container {
    margin-top: 40vh;
    width: 100%;
    display: flex;
    justify-content: center;
}

.login-box {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 35px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.login-box h2 {
    margin-bottom: 25px;
    font-weight: 500;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #56ab2f, #a8e063);
    color: white;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <div class="login-box">
        <h2>Área do Cliente</h2>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button>Entrar</button>
    </div>
</div>

</body>
</html>
